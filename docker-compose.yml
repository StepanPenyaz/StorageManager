services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      # DEMO ONLY — change this password before exposing outside localhost.
      SA_PASSWORD: "Your_password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  api:
    build:
      context: ./Backend/Storage
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__StorageDatabase: "Server=db,1433;Database=StorageManager;User Id=sa;Password=Your_password123!;TrustServerCertificate=true;Encrypt=false"
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mssql_data:
